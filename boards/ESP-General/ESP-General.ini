; =====================================================================
; Bruce Firmware - ESP32-S3 N16R8
; MODE: SINGLE SPI (STABLE & COMPATIBLE)
; =====================================================================

[env:esp32-s3-devkitc-1-psram]
extends                 = env:esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi
board_build.partitions  = custom_16Mb.csv
board_upload.flash_size = 16MB
board_build.f_flash     = 80000000L
board_build.flash_mode  = dio
board_build.f_cpu       = 240000000L
;board_build.psram_type  = opi

[env:esp32-s3-devkitc-1]
board                   = ESP-General
board_build.mcu         = esp32s3   
board_build.partitions  = custom_8Mb.csv
build_src_filter = ${env.build_src_filter} +<../boards/ESP-General>
board_build.arduino.memory_type = qio_opi

build_flags =
	${env.build_flags}
	-Iboards/ESP-General
	-Wl,--allow-multiple-definition 

	; ================= BASE =================
	-DUSB_as_HID=1
	-DDEVICE_NAME='"General Board Full"'
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM=1
	;-DUSE_PSRAM=1
	-DCORE_DEBUG_LEVEL=0

	; ================= BASIC PIN =================
	-DGROVE_SDA=8
	-DGROVE_SCL=46
	-DTXLED=40
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	; ================= IR =================
	-DIR_TX_PINS='{{"M5 IR Mod", GROVE_SDA}, {"Grove W", GROVE_SCL}}'
	-DIR_RX_PINS='{{"M5 IR Mod", GROVE_SCL}, {"Grove W", GROVE_SCL}}'

	; ================= RF 433 =================
	-DRF_TX_PINS='{{"M5 RF433T", GROVE_SDA}, {"Grove W", GROVE_SCL}}'
	-DRF_RX_PINS='{{"M5 RF433R", GROVE_SCL}, {"Grove W", GROVE_SCL}}'

	; ================= SPI BUS (SHARED) =================
	-DSPI_MOSI_PIN=21
	-DSPI_SCK_PIN=18
	-DSPI_MISO_PIN=19
	-DSPI_SS_PIN=-1

	; ================= TFT ILI9341 =================
	-DUSER_SETUP_LOADED=1
	-DHAS_SCREEN=1
	-DILI9341_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_RGB_ORDER=TFT_RGB
	-DTFT_INVERSION_OFF
	-DTFT_CS=5
	-DTFT_DC=16
	-DTFT_RST=17
	-DTFT_MOSI=21
	-DTFT_SCLK=18
	-DTFT_MISO=19
	-DTFT_BL=4
	-DBACKLIGHT=4
	-DTFT_BACKLIGHT_ON=1
	-DROTATION=1
	-DMINBRIGHT=160
	-DSMOOTH_FONT=1
	-DSPI_FREQUENCY=27000000
	-DSPI_READ_FREQUENCY=20000000
	-DFP=1
	-DFM=2
	-DFG=3

	; ================= TOUCH =================
	-DHAS_TOUCH=1
	-DTOUCH_CS=14
	-DTOUCH_IRQ=35
	-DSPI_TOUCH_FREQUENCY=2500000

	; ================= SD CARD =================
	-DSDCARD_CS=38
	-DSDCARD_SCK=18
	-DSDCARD_MISO=19
	-DSDCARD_MOSI=21

	; ================= CC1101 =================
	-DUSE_CC1101_VIA_SPI
	-DCC1101_SS_PIN=10
	-DCC1101_GDO0_PIN=9
	-DCC1101_GDO2_PIN=-1
	-DCC1101_MOSI_PIN=21
	-DCC1101_SCK_PIN=18
	-DCC1101_MISO_PIN=19

	; ================= NRF24 =================
	-DUSE_NRF24_VIA_SPI
	-DNRF24_SS_PIN=7
	-DNRF24_CE_PIN=6
	-DNRF24_MOSI_PIN=21
	-DNRF24_SCK_PIN=18
	-DNRF24_MISO_PIN=19

	; ================= PN532 (I2C MODE) =================
	; Set jumper PN532: SEL0=H, SEL1=H
	; Shares Grove I2C bus (SDA=8, SCL=46)
	; CHANGED: was SPI (SS=22, MOSI/SCK/MISO), now I2C
	-DPN532_SDA=8
	-DPN532_SCL=46
	-DPN532_IRQ=25
	-DPN532_RESET=-1

	; ================= LORA =================
	-DLORA_CS=33
	-DLORA_RST=36
	-DLORA_DIO0=37
	-DLORA_BUSY=34
	-DLORA_IRQ=37
	-DLORA_MOSI=21
	-DLORA_SCK=18
	-DLORA_MISO=19

	; ================= W5500 =================
	; CHANGED: SS was GPIO3 (konflik UART0), now GPIO27
	-DUSE_W5500_VIA_SPI
	-DW5500_SS_PIN=27
	-DW5500_INT_PIN=41
	-DW5500_RST_PIN=-1
	-DW5500_MOSI_PIN=21
	-DW5500_SCK_PIN=18
	-DW5500_MISO_PIN=19

	; ================= RFID LF =================
	-DRFID125_TX_PIN=43
	-DRFID125_RX_PIN=44

	; ================= GPS =================
	-DGPS_SERIAL_TX=1
	-DGPS_SERIAL_RX=2
	-DGPS_SERIAL_PPS=-1

	; ================= FM =================
	-DFM_SI4713=1
	-DFM_RSTPIN=12

	; ================= BUTTON =================
	-DSEL_BTN=13
	-DBTN_ALIAS='"OK"'
	-DBTN_ACT=LOW
	-DUP_BTN=11
	-DDOWN_BTN=15
	-DLEFT_BTN=20
	-DRIGHT_BTN=39
	-DBACK_BTN=45

	; ================= BW16 UART =================
	; ADDED: BW16 RTL8720DN co-processor for 5GHz WiFi
	; Wiring: BW16 LP_UART_TX(PB1)->GPIO24, LP_UART_RX(PB2)->GPIO23
	-DBW16_TX=23
	-DBW16_RX=24
	-DBW16_BAUD=115200

lib_deps =
	${env.lib_deps}
	nrf24/RF24 @ 1.4.11
	ESP32Async/AsyncTCP @ 3.4.10

; =====================================================================
; CS/PIN MAP
; TFT=5    Touch=14   CC1101=10  NRF24=7
; SD=38    W5500=27   LoRa=33
; MOSI=21  SCK=18     MISO=19
; RFID125 TX=43 RX=44  |  GPS TX=1 RX=2
; PN532 I2C SDA=8 SCL=46 IRQ=25
; W5500 INT=41
; BW16 TX=23 RX=24
; BTN SEL=13 UP=11 DOWN=15 LEFT=20 RIGHT=39 BACK=45
; =====================================================================

; =====================================================================
; CHANGELOG vs versi awal
; =====================================================================
; [CHANGED] TFT color: TFT_BGR+INVERSION_ON -> TFT_RGB+INVERSION_OFF
;           adjust warna via Bruce menu Settings
; [CHANGED] PN532: SPI (SS=22,MOSI,SCK,MISO) -> I2C (SDA=8,SCL=46)
;           hemat 3 pin SPI, set jumper SEL0=H SEL1=H di modul
; [CHANGED] PN532 IRQ: GPIO26 (tidak ada fisik di board) -> GPIO25
; [CHANGED] W5500 SS: GPIO3 (konflik UART0 RX) -> GPIO27
; [REMOVED] USE_TFT_eSPI_TOUCH
; [REMOVED] PN532 SPI pins (SS=22, MOSI, SCK, MISO)
; [ADDED]   BW16 UART TX=23 RX=24 BAUD=115200
; =====================================================================
