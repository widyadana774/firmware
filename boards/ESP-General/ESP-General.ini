; =====================================================================
; Bruce Firmware - ESP32-S3 N16R8
; MODE: SINGLE SPI (STABLE & COMPATIBLE)
; =====================================================================

[env:general]
extends                 = env:esp32-s3-devkitc-1
platform = espressif32@6.13.0
platform_packages =
    framework-arduinoespressif32 @ https://github.com/espressif/arduino-esp32.git#idf-release/v5.1
board = esp32-s3-devkitc-1
board_build.variant = esp32s3
board_build.core = esp32
framework = arduino

board_build.arduino.upstream_packages = no
lib_ldf_mode = deep+

monitor_speed = 115200
upload_speed = 921600

board_build.arduino.memory_type = qio_opi
board_build.partitions = custom_16Mb.csv
board_upload.flash_size = 16MB
board_build.f_flash = 40000000L
board_build.flash_mode = qio
board_build.f_cpu = 240000000L
board_build.psram_type = opi

build_unflags =
    -Woverloaded-virtual
    -Woverloaded-virtual=0
    
build_flags =
    ${env:esp32-s3-devkitc-1.build_flags}
    -include Arduino.h
    -DBOARD_HAS_PSRAM
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/cores/esp32
    -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/variants/esp32s3

    ; ================= BASE =================
    -DUSB_as_HID=1
    -DDEVICE_NAME='"General Board Full"'
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM=1
    -DCORE_DEBUG_LEVEL=0

    ; ================= BASIC PIN =================
    -DGROVE_SDA=8
    -DGROVE_SCL=46
    -DTXLED=40
    -DLED_ON=HIGH
    -DLED_OFF=LOW

    ; ================= IR =================
    -DIR_TX_PINS={ {"M5 IR Mod", GROVE_SDA}, {"Grove W", GROVE_SCL} }
    -DIR_RX_PINS={ {"M5 IR Mod", GROVE_SCL}, {"Grove W", GROVE_SCL} }

    ; ================= RF 433 =================
    -DRF_TX_PINS={ {"M5 RF433T", GROVE_SDA}, {"Grove W", GROVE_SCL} }
    -DRF_RX_PINS={ {"M5 RF433R", GROVE_SCL}, {"Grove W", GROVE_SCL} }

    ; ================= SPI BUS (SHARED) =================
    -DSPI_MOSI_PIN=21
    -DSPI_SCK_PIN=18
    -DSPI_MISO_PIN=19

    ; ================= TFT ILI9341 =================
    -DUSER_SETUP_LOADED=1
    -DHAS_SCREEN=1
    -DILI9341_DRIVER=1

    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=1

    -DTFT_CS=5
    -DTFT_DC=16
    -DTFT_RST=17

    -DTFT_MOSI=21
    -DTFT_SCLK=18
    -DTFT_MISO=19

    -DTFT_BL=4
    -DBACKLIGHT=4
    -DTFT_BACKLIGHT_ON=1

    -DROTATION=1
    -DMINBRIGHT=160
    -DSMOOTH_FONT=1

    ; SPI speed stabil
    -DSPI_FREQUENCY=27000000
    -DSPI_READ_FREQUENCY=20000000

    -DFP=1
    -DFM=2
    -DFG=3

    ; ================= TOUCH =================
    -DTOUCH_CS=14
    -DTOUCH_IRQ=35
    -DSPI_TOUCH_FREQUENCY=2500000

    ; ================= SD CARD =================
    -DSDCARD_CS=38
    -DSDCARD_SCK=18
    -DSDCARD_MISO=19
    -DSDCARD_MOSI=21

    ; ================= CC1101 =================
    -DUSE_CC1101_VIA_SPI
    -DCC1101_SS_PIN=10
    -DCC1101_GDO0_PIN=9
    -DCC1101_GDO2_PIN=-1

    ; ================= NRF24 =================
    -DUSE_NRF24_VIA_SPI
    -DNRF24_SS_PIN=7
    -DNRF24_CE_PIN=6

    ; ================= PN532 =================
    -DUSE_PN532_VIA_SPI
    -DPN532_SS_PIN=22
    -DPN532_IRQ=26

    ; ================= LORA =================
    -DUSE_LORA_VIA_SPI
    -DLORA_CS=33
    -DLORA_RST=36
    -DLORA_DIO0=37
    -DLORA_BUSY=34
    -DLORA_IRQ=37

    ; ================= W5500 =================
    -DUSE_W5500_VIA_SPI
    -DW5500_SS_PIN=3
    -DW5500_INT_PIN=41
    -DW5500_RST_PIN=-1

    ; ================= RFID LF =================
    -DRFID125_TX_PIN=1
    -DRFID125_RX_PIN=2

    ; ================= GPS =================
    -DGPS_SERIAL_TX=1
    -DGPS_SERIAL_RX=2
    -DGPS_SERIAL_PPS=-1

    ; ================= FM =================
    -DFM_SI4713=1
    -DFM_RSTPIN=12

    ; ================= BUTTON =================
    -DBTN_ALIAS='"OK"'

lib_deps =
    ${env:esp32-s3-devkitc-1.lib_deps}
    nrf24/RF24 @ 1.4.11
    
